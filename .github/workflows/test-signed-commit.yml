name: Test GPG-Signed Commit via GitHub API

on:
  workflow_dispatch:

jobs:
  create-signed-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate JWT and get Installation Token
        id: get-token
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          # Ensure required secrets are present
          if [[ -z "${APP_ID}" ]] || [[ -z "${APP_PRIVATE_KEY}" ]]; then
            echo "❌ Error: APP_ID or APP_PRIVATE_KEY secret is missing"
            exit 1
          fi

          echo "🔐 Generating JWT..."

          # Save private key to file
          echo "${APP_PRIVATE_KEY}" > private-key.pem

          # JWT header and payload
          NOW=$(date +%s)
          EXP=$((NOW + 600)) # 10 minutes expiry

          HEADER='{"alg":"RS256","typ":"JWT"}'
          PAYLOAD=$(jq -n \
            --arg iat "${NOW}" \
            --arg exp "${EXP}" \
            --arg iss "${APP_ID}" \
            '{iat: ($iat | tonumber), exp: ($exp | tonumber), iss: ($iss | tonumber)}')

          # Base64url encode (no padding)
          b64url() {
            openssl base64 -A | tr '+/' '-_' | tr -d '='
          }

          HEADER_B64=$(echo -n "${HEADER}" | b64url)
          PAYLOAD_B64=$(echo -n "${PAYLOAD}" | b64url)

          # Sign with RSA private key
          SIGNATURE=$(echo -n "${HEADER_B64}.${PAYLOAD_B64}" | \
            openssl dgst -sha256 -sign private-key.pem | b64url)

          JWT="${HEADER_B64}.${PAYLOAD_B64}.${SIGNATURE}"

          # Clean up private key
          rm -f private-key.pem

          echo "✅ JWT generated"

          # Get installation ID
          echo "🔍 Finding installation ID..."
          INSTALLATION_RESPONSE=$(curl -sS -f -X GET \
            -H "Authorization: Bearer ${JWT}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/app/installations" || {
              echo "❌ Failed to get installations"
              exit 1
            })

          INSTALLATION_ID=$(echo "${INSTALLATION_RESPONSE}" | jq -r '.[0].id')

          if [[ -z "${INSTALLATION_ID}" ]] || [[ "${INSTALLATION_ID}" == "null" ]]; then
            echo "❌ Error: Could not find installation ID"
            echo "Response: ${INSTALLATION_RESPONSE}"
            exit 1
          fi

          echo "✅ Installation ID: ${INSTALLATION_ID}"

          # Exchange JWT for Installation Token
          echo "🔄 Getting installation token..."
          TOKEN_RESPONSE=$(curl -sS -f -X POST \
            -H "Authorization: Bearer ${JWT}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/app/installations/${INSTALLATION_ID}/access_tokens" || {
              echo "❌ Failed to get installation token"
              exit 1
            })

          INSTALLATION_TOKEN=$(echo "${TOKEN_RESPONSE}" | jq -r '.token')

          if [[ -z "${INSTALLATION_TOKEN}" ]] || [[ "${INSTALLATION_TOKEN}" == "null" ]]; then
            echo "❌ Error: Could not get installation token"
            echo "Response: ${TOKEN_RESPONSE}"
            exit 1
          fi

          echo "✅ Installation token obtained"

          # Mask the token in logs
          echo "::add-mask::${INSTALLATION_TOKEN}"
          echo "INSTALLATION_TOKEN=${INSTALLATION_TOKEN}" >> $GITHUB_OUTPUT

      - name: Create commit via GitHub API
        env:
          GITHUB_TOKEN: ${{ steps.get-token.outputs.INSTALLATION_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          echo "📝 Creating commit with timestamp: ${TIMESTAMP}"

          # Get the current commit SHA of the main branch
          echo "🔍 Getting current branch SHA..."
          REF_RESPONSE=$(curl -sS -f \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/git/ref/heads/${{ github.ref_name }}" || {
              echo "❌ Failed to get ref"
              exit 1
            })

          BASE_SHA=$(echo "${REF_RESPONSE}" | jq -r '.object.sha')

          if [[ -z "${BASE_SHA}" ]] || [[ "${BASE_SHA}" == "null" ]]; then
            echo "❌ Error: Could not get base commit SHA"
            exit 1
          fi

          echo "✅ Base commit: ${BASE_SHA}"

          # Get the base tree SHA
          echo "🌳 Getting base tree..."
          COMMIT_RESPONSE=$(curl -sS -f \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/git/commits/${BASE_SHA}" || {
              echo "❌ Failed to get commit"
              exit 1
            })

          BASE_TREE=$(echo "${COMMIT_RESPONSE}" | jq -r '.tree.sha')

          if [[ -z "${BASE_TREE}" ]] || [[ "${BASE_TREE}" == "null" ]]; then
            echo "❌ Error: Could not get base tree SHA"
            exit 1
          fi

          echo "✅ Base tree: ${BASE_TREE}"

          # Create new tree with updated timestamp.txt
          echo "🌳 Creating new tree..."
          TREE_RESPONSE=$(curl -sS -f -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/git/trees" \
            -d "$(jq -n \
              --arg base_tree "${BASE_TREE}" \
              --arg content "Updated: ${TIMESTAMP}" \
              '{
                base_tree: $base_tree,
                tree: [
                  {
                    path: "timestamp.txt",
                    mode: "100644",
                    type: "blob",
                    content: $content
                  }
                ]
              }')" || {
              echo "❌ Failed to create tree"
              exit 1
            })

          NEW_TREE=$(echo "${TREE_RESPONSE}" | jq -r '.sha')

          if [[ -z "${NEW_TREE}" ]] || [[ "${NEW_TREE}" == "null" ]]; then
            echo "❌ Error: Could not create new tree"
            echo "Response: ${TREE_RESPONSE}"
            exit 1
          fi

          echo "✅ New tree: ${NEW_TREE}"

          # Create commit
          echo "💾 Creating commit..."
          COMMIT_CREATE_RESPONSE=$(curl -sS -f -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/git/commits" \
            -d "$(jq -n \
              --arg message "Update timestamp via GitHub App API\n\nTimestamp: ${TIMESTAMP}\nCreated by GitHub App Installation Token" \
              --arg tree "${NEW_TREE}" \
              --argjson parents "[\"${BASE_SHA}\"]" \
              '{
                message: $message,
                tree: $tree,
                parents: $parents
              }')" || {
              echo "❌ Failed to create commit"
              exit 1
            })

          NEW_COMMIT=$(echo "${COMMIT_CREATE_RESPONSE}" | jq -r '.sha')

          if [[ -z "${NEW_COMMIT}" ]] || [[ "${NEW_COMMIT}" == "null" ]]; then
            echo "❌ Error: Could not create commit"
            echo "Response: ${COMMIT_CREATE_RESPONSE}"
            exit 1
          fi

          echo "✅ New commit: ${NEW_COMMIT}"

          # Update ref
          echo "🔄 Updating ref..."
          UPDATE_RESPONSE=$(curl -sS -f -X PATCH \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/git/refs/heads/${{ github.ref_name }}" \
            -d "$(jq -n \
              --arg sha "${NEW_COMMIT}" \
              '{sha: $sha, force: false}')" || {
              echo "❌ Failed to update ref"
              exit 1
            })

          UPDATED_SHA=$(echo "${UPDATE_RESPONSE}" | jq -r '.object.sha')

          if [[ "${UPDATED_SHA}" != "${NEW_COMMIT}" ]]; then
            echo "❌ Error: Ref update returned unexpected SHA"
            exit 1
          fi

          echo "✅ Ref updated successfully"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ SUCCESS! Commit created via GitHub App Installation Token"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "Commit SHA: ${NEW_COMMIT}"
          echo "Repository: https://github.com/${REPO_OWNER}/${REPO_NAME}"
          echo "Commit URL: https://github.com/${REPO_OWNER}/${REPO_NAME}/commit/${NEW_COMMIT}"
          echo ""
          echo "👉 Check the commit page to verify the 'Verified' badge appears"
          echo ""
